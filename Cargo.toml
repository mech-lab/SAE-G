[workspace]
resolver = "2"
members = [
  "crates/gsae-core-types",
  "crates/gsae-linalg",
  "crates/gsae-state-geometry",
  "crates/gsae-autodiff",
  "crates/gsae-chart-core",
  "crates/gsae-pullback-metric",
  "crates/gsae-geodesics",
  "crates/gsae-objective",
  "crates/gsae-1-chart",
  "crates/gsae-2-metric",
  "crates/gsae-3-gauge",
  "crates/gsae-4-transport",
  "crates/gsae-5-hypergraph",
  "crates/gsae-6-hyperpath",
  "crates/gsae-atlas-router",
  "crates/gsae-atlas-manager",
  "crates/gsae-multilayer-runtime",
  "crates/gsae-training",
  "crates/gsae-artifacts",
  "crates/gsae-benchmarks",
  "crates/gsae-cli",
  "crates/gsae-py",
  "crates/gsae-demo",
]

[workspace.package]
edition = "2021"
version = "0.1.0"
authors = ["OpenAI"]
license = "MIT"

[workspace.dependencies]
gsae-core-types = { path = "crates/gsae-core-types" }
