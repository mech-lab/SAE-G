gsae-objective = { path = "crates/gsae-objective" }
gsae-1-chart = { path = "crates/gsae-1-chart" }
gsae-2-metric = { path = "crates/gsae-2-metric" }
gsae-3-gauge = { path = "crates/gsae-3-gauge" }
gsae-4-transport = { path = "crates/gsae-4-transport" }
gsae-5-hypergraph = { path = "crates/gsae-5-hypergraph" }
gsae-6-hyperpath = { path = "crates/gsae-6-hyperpath" }
gsae-atlas-router = { path = "crates/gsae-atlas-router" }
